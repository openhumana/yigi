appId: com.openhumana.yogi
productName: Yogi Browser
copyright: Copyright © 2024 OpenHumana

electronDist: node_modules/electron/dist
electronVersion: "29.1.1"

directories:
  output: build
  buildResources: resources

files:
  - dist/**
  - dist-electron/**
  - package.json

asar: true

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch: [x64]
  artifactName: YogiBrowser-Win-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: Yogi Browser
  uninstallDisplayName: Yogi Browser
  createDesktopShortcut: always
  createStartMenuShortcut: true

mac:
  icon: resources/icon.icns
  category: public.app-category.productivity
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  darkModeSupport: true
  extendInfo:
    NSCameraUsageDescription: Yogi Browser uses the camera for automation tasks.
    NSMicrophoneUsageDescription: Yogi Browser uses the microphone for automation tasks.
    NSScreenCaptureDescription: Yogi Browser captures the screen for AI automation.
    NSAppleEventsUsageDescription: Yogi Browser uses Apple Events for automation.
  target:
    - target: zip
      arch: [arm64]
  artifactName: YogiBrowser-Mac-${version}-arm64.${ext}

linux:
  icon: resources/icon.png
  category: Network
  target:
    - target: AppImage
      arch: [x64]
  artifactName: YogiBrowser-Linux-${version}.${ext}

publish: null
